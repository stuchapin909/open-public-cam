name: Parallel Nightly Validation

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      total_shards:
        description: 'Number of parallel shards'
        required: false
        default: '8'

concurrency:
  group: parallel-validation
  cancel-in-progress: false

jobs:
  # Phase 1: Validate cameras in parallel shards
  validate-shard:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
      fail-fast: false
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Validate shard ${{ matrix.shard }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHARD_INDEX: ${{ matrix.shard }}
          TOTAL_SHARDS: ${{ github.event.inputs.total_shards || 8 }}
        run: node validate-shard.js

      - name: Upload shard results
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shard }}
          path: .shard-results/shard-${{ matrix.shard }}.json
          retention-days: 1

  # Phase 2: Merge all shard results and commit
  merge-and-commit:
    if: github.actor != 'github-actions[bot]'
    needs: validate-shard
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all shard results
        uses: actions/download-artifact@v4
        with:
          path: .shard-results
          pattern: shard-*

      - name: Install dependencies
        run: npm install

      - name: Merge, update counts, and commit results
        env:
          MAX_CONSECUTIVE_FAILURES: 2
        run: |
          node merge-shards.js
          SUMMARY=$(cat .validation-summary.json)
          REMOVED=$(echo "$SUMMARY" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));process.stdout.write(String(d.removed))")
          PASSED=$(echo "$SUMMARY" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));process.stdout.write(String(d.passed))")
          TOTAL=$(echo "$SUMMARY" | node -e "const d=JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));process.stdout.write(String(d.total_checked))")
          echo "$SUMMARY"
          node update-counts.js
          git config --global user.name "registry-bot"
          git config --global user.email "bot@openeagleeye.local"
          git add cameras.json .registry-state.json README.md
          git diff --cached --quiet || git commit -m "Validator: parallel nightly check ($REMOVED removed, $PASSED/$TOTAL passed)"
          git push
