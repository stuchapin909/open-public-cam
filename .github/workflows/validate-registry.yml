name: Registry Validator

on:
  push:
    branches: [master]
    paths: ['community-registry.json', 'validation-log.json', '.github/workflows/validate-registry.yml']
  pull_request:
    paths: ['community-registry.json', 'validation-log.json', '.github/workflows/validate-registry.yml']
  schedule:
    - cron: '0 3 * * *'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      models: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Validate registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node validate-registry.js

      - name: Commit fixes (push to master only)
        if: github.event_name == 'push'
        run: |
          git config --global user.name "registry-bot"
          git config --global user.email "bot@open-public-cam.local"
          git add community-registry.json validation-log.json
          git diff --cached --quiet || (git commit -m "Validator: auto-remove invalid entries" && git push)

      - name: Commit nightly batch results
        if: github.event_name == 'schedule'
        run: |
          git config --global user.name "registry-bot"
          git config --global user.email "bot@open-public-cam.local"
          git add community-registry.json validation-log.json
          git diff --cached --quiet || (git commit -m "Validator: nightly batch check" && git push)
