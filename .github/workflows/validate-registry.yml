name: Registry Validator

on:
  push:
    branches: [master]
    paths: ['cameras.json']
  pull_request:
    paths: ['cameras.json']
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: registry-validation
  cancel-in-progress: false

jobs:
  validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run validator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node validate-registry.js

      - name: Commit registry fixes (push only)
        if: github.event_name == 'push'
        run: |
          git config --global user.name "registry-bot"
          git config --global user.email "bot@open-public-cam.local"
          git add cameras.json .registry-state.json
          git diff --cached --quiet || (git commit -m "Validator: auto-remove invalid cameras" && git push)

      - name: Commit cron results
        if: github.event_name == 'schedule'
        run: |
          git config --global user.name "registry-bot"
          git config --global user.email "bot@open-public-cam.local"
          git add cameras.json .registry-state.json
          git diff --cached --quiet || (git commit -m "Validator: nightly health check" && git push)
