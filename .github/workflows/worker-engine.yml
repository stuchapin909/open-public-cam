name: Webcam Worker Engine

on:
  push:
    branches: [master]
  issues:
    types: [opened]
  schedule:
    - cron: '0 3 * * *' # Nightly at 3 AM UTC

concurrency:
  group: webcam-registry-update
  cancel-in-progress: false

jobs:
  worker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: master-branch

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: master-branch/package-lock.json

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('master-branch/package-lock.json') }}

      - name: Install dependencies
        run: |
          cd master-branch
          npm ci
          npx playwright install chromium --with-deps

      - name: Run Nightly Batch Check
        if: github.event_name == 'schedule'
        run: |
          cd master-branch
          node worker-verify.js --batch
          git config --global user.name "Webcam-Worker-Bot"
          git config --global user.email "bot@open-public-cam.local"
          if [ -n "$(git status --porcelain)" ]; then
            git add validation-log.json
            git commit -m "Worker: Nightly Batch Validation Complete"
            git push origin master
          fi

      - name: Extract JSON from Issue
        if: github.event_name == 'issues'
        id: extract_json
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            const regex = /```json\s+([\s\S]*?)\s+```/;
            const match = body.match(regex);
            if (match) {
              core.setOutput('DATA', match[1].trim());
            } else {
              core.setFailed("Deterministic Error: No JSON block found in issue body.");
            }

      - name: Execute Deterministic Verification
        if: github.event_name == 'issues'
        id: verify
        env:
          INPUT_DATA: ${{ steps.extract_json.outputs.DATA }}
        run: |
          cd master-branch
          set +e
          node worker-verify.js --issue ${{ github.event.issue.number }} "$INPUT_DATA" > worker-stdout.log 2>&1
          EXIT_CODE=$?
          set -e
          {
            echo "RESULTS<<EOF"
            if [ -f worker-results.txt ]; then
              cat worker-results.txt
            else
              echo "No detailed findings captured. Exit Code: $EXIT_CODE"
            fi
            echo "EOF"
            echo "EXIT_CODE=$EXIT_CODE"
          } >> "$GITHUB_OUTPUT"

      - name: Commit Registry Changes (Master)
        if: github.event_name == 'issues'
        run: |
          cd master-branch
          if [ "${{ steps.verify.outputs.EXIT_CODE }}" == "0" ]; then
            git config --global user.name "Webcam-Worker-Bot"
            git config --global user.email "bot@open-public-cam.local"
            git add community-registry.json validation-log.json
            if [ -n "$(git status --porcelain community-registry.json validation-log.json)" ]; then
              git commit -m "Worker: Verified and updated registry for Issue #${{ github.event.issue.number }}"
              git push origin master
            fi
          fi

      - name: Commit Evidence (Ghost Branch)
        if: github.event_name == 'issues'
        run: |
          git clone --branch gh-evidence https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} evidence-branch || \
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} evidence-branch
          
          cd evidence-branch
          if ! git show-ref --verify --quiet refs/remotes/origin/gh-evidence; then
            git checkout --orphan gh-evidence
            git rm -rf .
          else
            git checkout gh-evidence
          fi
          
          mkdir -p verification-evidence
          cp ../master-branch/verification-evidence/*.jpg verification-evidence/ || true
          
          git config --global user.name "Webcam-Worker-Bot"
          git config --global user.email "bot@open-public-cam.local"
          git add verification-evidence/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Worker: Visual Evidence for Issue #${{ github.event.issue.number }}"
            git push origin gh-evidence
          fi

      - name: Finalize Issue Comment (Always)
        if: github.event_name == 'issues' && always()
        uses: actions/github-script@v7
        env:
          RESULTS: ${{ steps.verify.outputs.RESULTS }}
          EXIT_CODE: ${{ steps.verify.outputs.EXIT_CODE }}
        with:
          script: |
            const { RESULTS, EXIT_CODE } = process.env;
            const isSuccess = EXIT_CODE === "0";
            const issueNumber = context.issue.number;
            const repo = context.repo.owner + "/" + context.repo.repo;
            const labels = context.payload.issue.labels.map(l => l.name);
            const isSubmission = labels.includes('webcam-submission');
            
            let statusEmoji = isSuccess ? "✅" : "❌";
            let statusText = isSuccess ? "Worker Verified" : "Worker Check Failed";
            
            const img1 = `https://raw.githubusercontent.com/${repo}/gh-evidence/verification-evidence/issue-${issueNumber}-shot1.jpg`;
            const img2 = `https://raw.githubusercontent.com/${repo}/gh-evidence/verification-evidence/issue-${issueNumber}-shot2.jpg`;
            
            let decisionMsg = "";
            if (isSuccess) {
              decisionMsg = isSubmission 
                ? "The link is active and showing motion. It has been merged into the global registry."
                : "The health report was confirmed (link is dead or static). The camera has been flagged as offline.";
            } else {
              decisionMsg = isSubmission
                ? "The submission was rejected because the link appears dead, static, or triggered privacy filters."
                : "The health report was refuted. The camera appears to be active and healthy.";
            }

            const commentBody = [
              `${statusEmoji} **${statusText}**: The deterministic verification process is complete.`,
              ``,
              `### 🕵️ Methodology`,
              `To maintain a high-quality, autonomous registry, the worker:`,
              `1. Orchestrates a headless Chromium instance to the target URL.`,
              `2. Executes a **Multi-Layered Anti-Ad Strategy** (Network blocking + CSS Cloaking).`,
              `3. Bypasses common cookie and GDPR consent barriers.`,
              `4. Performs an **Entropy-Based Motion Check**: Captures two frames 5 seconds apart.`,
              ``,
              `### 📸 Visual Evidence`,
              `*(Images stored on isolated \`gh-evidence\` branch)*`,
              `| Shot 1 (T+0s) | Shot 2 (T+5s) |`,
              `| :---: | :---: |`,
              `| ![](${img1}) | ![](${img2}) |`,
              ``,
              `### 🛠 Decision & Findings`,
              `> **${decisionMsg}**`,
              ``,
              `**Technical Details:**`,
              `\`\`\``,
              `${RESULTS ? RESULTS.trim() : 'No detailed results captured.'}\nExit Code: ${EXIT_CODE}`,
              `\`\`\``
            ].join('\n');
            
            github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
            
            github.rest.issues.update({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });
