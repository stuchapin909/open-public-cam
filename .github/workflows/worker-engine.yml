name: Webcam Worker Engine

on:
  issues:
    types: [opened]
  schedule:
    - cron: '0 3 * * *' # Nightly at 3 AM UTC

jobs:
  worker:
    if: |
      github.event_name == 'schedule' ||
      contains(github.event.issue.labels.*.name, 'webcam-report') ||
      contains(github.event.issue.labels.*.name, 'webcam-submission')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Run Nightly Batch Check
        if: github.event_name == 'schedule'
        run: |
          node worker-verify.js --batch
          git config --global user.name "Webcam-Worker-Bot"
          git config --global user.email "bot@open-public-cam.local"
          git add validation-log.json
          git commit -m "Worker: Nightly Batch Validation Complete" || echo "No changes to commit"
          git pull --rebase || true
          git push

      - name: Extract JSON from Issue
        if: github.event_name == 'issues'
        id: extract_json
        run: |
          JSON_DATA=$(echo "${{ github.event.issue.body }}" | sed -n '/```json/,/```/p' | sed '1d;$d')
          echo "DATA=$JSON_DATA" >> $GITHUB_OUTPUT

      - name: Verify Issue (Submission or Report)
        if: github.event_name == 'issues'
        id: verify
        run: |
          node worker-verify.js '${{ steps.extract_json.outputs.DATA }}' | tee worker-stdout.log
          RESULTS=$(grep "WORKER_RESULT:" worker-stdout.log | cut -d':' -f2-)
          if [ -z "$RESULTS" ]; then RESULTS="No detailed results captured."; fi
          echo "RESULTS=$RESULTS" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit Verified Changes
        if: github.event_name == 'issues' && steps.verify.outcome == 'success'
        run: |
          git config --global user.name "Webcam-Worker-Bot"
          git config --global user.email "bot@open-public-cam.local"
          git add community-registry.json validation-log.json
          git commit -m "Worker: Verified and updated registry for ${{ github.event.issue.title }}" || echo "No changes to commit"
          git pull --rebase || true
          git push

      - name: Comment and Close (Success)
        if: github.event_name == 'issues' && steps.verify.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const results = process.env.WORKER_RESULTS || "No details available.";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "✅ **Worker Verified**: The submission or report has been confirmed and merged into the global registry.\n\n**Technical Findings:**\n```\n" + results.trim() + "\n```"
            });
            github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });
        env:
          WORKER_RESULTS: ${{ steps.verify.outputs.RESULTS }}

      - name: Comment and Close (Failure)
        if: github.event_name == 'issues' && steps.verify.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const results = process.env.WORKER_RESULTS || "No details available.";
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "❌ **Worker Check Failed**: The webcam appears to be unreachable or invalid. Submission/Report rejected.\n\n**Technical Findings:**\n```\n" + results.trim() + "\n```"
            });
            github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });
        env:
          WORKER_RESULTS: ${{ steps.verify.outputs.RESULTS }}
