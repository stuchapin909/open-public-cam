name: Webcam Worker Engine

on:
  push:
    branches: [master]
  issues:
    types: [opened]
  schedule:
    - cron: '0 3 * * *' # Nightly at 3 AM UTC

concurrency:
  group: webcam-registry-update
  cancel-in-progress: false

jobs:
  worker:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: master-branch

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: master-branch/package-lock.json

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('master-branch/package-lock.json') }}

      - name: Install dependencies
        run: |
          cd master-branch
          npm ci
          npx playwright install chromium --with-deps

      - name: Run Nightly Batch Check
        if: github.event_name == 'schedule'
        run: |
          cd master-branch
          node worker-verify.js --batch
          git config --global user.name "Webcam-Worker-Bot"
          git config --global user.email "bot@open-public-cam.local"
          if [ -n "$(git status --porcelain)" ]; then
            git add validation-log.json
            git commit -m "Worker: Nightly Batch Validation Complete"
            git push origin master
          fi

      - name: Extract JSON from Issue
        if: github.event_name == 'issues'
        id: extract_json
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            const regex = /```json\s+([\s\S]*?)\s+```/;
            const match = body.match(regex);
            if (match) {
              core.setOutput('DATA', match[1].trim());
            } else {
              core.setFailed("Deterministic Error: No JSON block found in issue body.");
            }

      - name: Execute Deterministic Verification
        if: github.event_name == 'issues'
        id: verify
        env:
          INPUT_DATA: ${{ steps.extract_json.outputs.DATA }}
        run: |
          cd master-branch
          set +e
          node worker-verify.js --issue ${{ github.event.issue.number }} "$INPUT_DATA" > worker-stdout.log 2>&1
          EXIT_CODE=$?
          set -e
          {
            echo "RESULTS<<EOF"
            if [ -f worker-results.txt ]; then
              cat worker-results.txt
            else
              echo "No detailed findings captured. Exit Code: $EXIT_CODE"
            fi
            echo "EOF"
            echo "EXIT_CODE=$EXIT_CODE"
          } >> "$GITHUB_OUTPUT"

      - name: Commit Registry Changes (Master)
        if: github.event_name == 'issues' && steps.verify.outputs.EXIT_CODE == '0'
        run: |
          cd master-branch
          git config --global user.name "Webcam-Worker-Bot"
          git config --global user.email "bot@open-public-cam.local"
          git add community-registry.json validation-log.json
          if [ -n "$(git status --porcelain community-registry.json validation-log.json)" ]; then
            git commit -m "Worker: Verified and updated registry for Issue #${{ github.event.issue.number }}"
            git push origin master
          fi

      - name: Commit Evidence (Ghost Branch)
        if: github.event_name == 'issues'
        run: |
          git clone --branch gh-evidence https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} evidence-branch || \
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} evidence-branch
          
          cd evidence-branch
          if ! git show-ref --verify --quiet refs/remotes/origin/gh-evidence; then
            git checkout --orphan gh-evidence
            git rm -rf .
          else
            git checkout gh-evidence
          fi
          
          mkdir -p verification-evidence
          cp ../master-branch/verification-evidence/*.jpg verification-evidence/ || true
          
          git config --global user.name "Webcam-Worker-Bot"
          git config --global user.email "bot@open-public-cam.local"
          git add verification-evidence/
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Worker: Visual Evidence for Issue #${{ github.event.issue.number }}"
            git push origin gh-evidence
          fi

      - name: Finalize Issue Comment (Always)
        if: github.event_name == 'issues' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const exitCode = "${{ steps.verify.outputs.EXIT_CODE }}";
            const results = process.env.WORKER_RESULTS || "No details available.";
            const isSuccess = exitCode === "0";
            const issueNumber = context.issue.number;
            const repo = context.repo.owner + "/" + context.repo.repo;
            let statusEmoji = isSuccess ? "✅" : "❌";
            let statusText = isSuccess ? "Worker Verified" : "Worker Check Failed";
            const img1 = `https://raw.githubusercontent.com/${repo}/gh-evidence/verification-evidence/issue-${issueNumber}-shot1.jpg`;
            const img2 = `https://raw.githubusercontent.com/${repo}/gh-evidence/verification-evidence/issue-${issueNumber}-shot2.jpg`;
            const commentBody = `${statusEmoji} **${statusText}**: The deterministic verification process is complete.\n\n### 📸 Visual Evidence\n*(Stored on isolated branch)*\n| Shot 1 (T+0s) | Shot 2 (T+5s) |\n| :---: | :---: |\n| ![](${img1}) | ![](${img2}) |\n\n### 🛠 Technical Findings\n\`\`\`\n${results.trim()}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: commentBody
            });
            github.rest.issues.update({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });
        env:
          WORKER_RESULTS: ${{ steps.verify.outputs.RESULTS }}
